name: Sincronizza Google Sheets

# ─────────────────────────────────────────────────────────────
#  Scarica i due CSV pubblicati da Google Sheets (fogli query
#  del foglio Main) e li salva in dati/:
#    dati/segnalazioni.csv  ← foglio 'Segnalazioni' (aperte)
#    dati/risolte.csv       ← foglio 'Risolta'
# ─────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '*/30 * * * *'   # ogni 30 minuti (min. intervallo GitHub)
  workflow_dispatch:           # avvio manuale da GitHub → Actions

permissions:
  contents: write              # necessario per il commit/push

env:
  CSV_APERTE:  "https://docs.google.com/spreadsheets/d/e/2PACX-1vSsv5emsudeZOCiaREWWRFP14r5ZSmMW-WzwBTNv-aUitRaEb8mOy5dbm4KmBjpSwSSn2A-GAL7UGYz/pub?gid=1984873064&single=true&output=csv"
  CSV_RISOLTE: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSsv5emsudeZOCiaREWWRFP14r5ZSmMW-WzwBTNv-aUitRaEb8mOy5dbm4KmBjpSwSSn2A-GAL7UGYz/pub?gid=790985167&single=true&output=csv"

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Scarica CSV e aggiorna repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scarica CSV da Google Sheets
        run: |
          echo "Scaricando segnalazioni aperte..."
          curl -L "$CSV_APERTE"  --output dati/segnalazioni.csv --fail --silent --show-error
          echo "Aperte: $(wc -l < dati/segnalazioni.csv) righe"

          echo "Scaricando segnalazioni risolte..."
          curl -L "$CSV_RISOLTE" --output dati/risolte.csv     --fail --silent --show-error
          echo "Risolte: $(wc -l < dati/risolte.csv) righe"

      - name: Rimuovi colonna Token_Risoluzione dai CSV pubblici
        run: |
          python3 << 'PYEOF'
          import csv, os

          def strip_token(path):
              if not os.path.exists(path):
                  print(f"{path} non trovato, skip.")
                  return
              with open(path, newline='', encoding='utf-8') as f:
                  reader = csv.DictReader(f)
                  rows = list(reader)
                  fieldnames = list(reader.fieldnames or [])
              if 'Token_Risoluzione' not in fieldnames:
                  print(f"{path}: Token_Risoluzione non presente — nessuna modifica.")
                  return
              public_fields = [c for c in fieldnames if c != 'Token_Risoluzione']
              with open(path, 'w', newline='', encoding='utf-8') as f:
                  writer = csv.DictWriter(f, fieldnames=public_fields, extrasaction='ignore')
                  writer.writeheader()
                  writer.writerows(rows)
              print(f"✓ {path}: Token_Risoluzione rimossa ({len(rows)} righe)")

          strip_token("dati/segnalazioni.csv")
          strip_token("dati/risolte.csv")
          PYEOF

      - name: Commit e push se ci sono modifiche
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dati/segnalazioni.csv dati/risolte.csv

          if git diff --cached --quiet; then
            echo "Nessuna modifica — skip commit."
          else
            APERTE=$(tail -n +2 dati/segnalazioni.csv | grep -c . 2>/dev/null || echo "?")
            RISOLTE=$(tail -n +2 dati/risolte.csv     | grep -c . 2>/dev/null || echo "?")
            git commit -m "sync: ${APERTE} aperte, ${RISOLTE} risolte [skip ci]"
            git push
            echo "Commit: ${APERTE} aperte, ${RISOLTE} risolte."
          fi
